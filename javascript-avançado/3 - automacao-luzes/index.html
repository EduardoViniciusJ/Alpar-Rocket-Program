<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação de Luzes</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="https://eduardoviniciusj.github.io/Alpar-Rocket-Program/" target="_blank">Portfólio</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Central de Luzes</h1>

            <div class="rooms-container">
                <div class="room-group">
                    <div id="quarto" class="room-box">Quarto</div>
                    <div class="controls">
                        <button data-comodo="quarto" data-acao="ligar">Ligar</button>
                        <button data-comodo="quarto" data-acao="desligar">Desligar</button>
                    </div>
                </div>

                <div class="room-group">
                    <div id="sala" class="room-box">Sala</div>
                    <div class="controls">
                        <button data-comodo="sala" data-acao="ligar">Ligar</button>
                        <button data-comodo="sala" data-acao="desligar">Desligar</button>
                    </div>
                </div>
            </div>

            <p id="status-display"></p>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy;Eduardo Vinicius Jorge</p>
    </footer>

    <script src="./js/services/lightcenter.js"></script>
    <script src="./js/controller/lightcenter-controller.js"></script>
</body>
</html>
