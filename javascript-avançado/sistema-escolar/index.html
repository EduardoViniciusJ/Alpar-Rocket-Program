<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Educacional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">Sistema Escolar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                     <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="../../../index.html">Voltar</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-4">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-md-8 col-lg-5">
                <section class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 fw-bold text-center mb-4">Acesso ao Sistema</h1>

                        <form id="loginForm" class="d-flex flex-column gap-3">
                            <div id="errorMessage" class="alert alert-danger d-none mb-0" role="alert"></div>

                            <div>
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail" required>
                            </div>

                            <div>
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
                            </div>

                            <button type="submit" class="btn btn-dark w-100">Entrar</button>
                        </form>

                        <div class="mt-4 pt-3 border-top">
                            <p class="fw-semibold mb-2">Credenciais para teste:</p>
                            <p class="mb-1"><strong>Aluno:</strong> joao@gmail.com / senha123</p>
                            <p class="mb-0"><strong>Professor:</strong> ana@gov.br / senha456</p>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="bg-white text-dark py-1 border-top text-muted shadow-sm">
        <p class="m-3 small">
            &copy; 2026 <strong>Eduardo Vinicius</strong>
        </p>
    </footer>

    <script src="./assets/js/entities/user.entity.js"></script>
    <script src="./assets/js/entities/student.entity.js"></script>
    <script src="./assets/js/entities/teacher.entity.js"></script>
    <script src="./assets/js/services/auth.service.js"></script>
    <script src="./assets/js/controllers/login.controller.js"></script>
</body>
</html>
