<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon.png">
    <title>Formulário Simples</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link" href="https://eduardoviniciusj.github.io/alpar/">
                                Voltar
                            </a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </header>


    <main class="flex-grow-1 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-8 col-md-6 col-lg-5">

                    <div class="border border-2 rounded-3 p-4 shadow bg-white">

                        <div id="alertaSucesso" class="alert alert-success d-none" role="alert">
                            Formulário enviado com sucesso!
                        </div>

                        <form id="meuFormulario">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="assunto" class="form-label">Assunto</label>
                                <select class="form-select" id="assunto" required>
                                    <option value="" selected disabled>Selecione o assunto</option>
                                    <option value="1">Suporte Técnico</option>
                                    <option value="2">Vendas</option>
                                    <option value="3">Outros</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="mensagem" class="form-label">Mensagem</label>
                                <textarea class="form-control" id="mensagem" rows="3" placeholder="Como podemos ajudar?"
                                    required></textarea>
                            </div>

                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="termos" required>
                                <label class="form-check-label" for="termos">
                                    Aceito os termos e condições
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Enviar
                            </button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white text-dark py-1 border-top text-muted shadow-sm">
        <p class="m-3 small">
            &copy; 2026 <strong>Formulário Simples</strong>
        </p>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/html-css-bootstrap/bootstrap/4-formulario-simples/js/main.js"></script>
</body>

</html>
